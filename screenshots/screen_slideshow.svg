<svg width="240" height="480" viewBox="0 0 240 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="slide0" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#FF9671"/>
    </linearGradient>
    <clipPath id="phone"><rect width="240" height="480" rx="28"/></clipPath>
  </defs>

  <!-- Phone frame -->
  <rect width="240" height="480" rx="28" fill="#111" stroke="#444" stroke-width="2"/>
  <rect x="3" y="3" width="234" height="474" rx="26" fill="url(#slide0)" clip-path="url(#phone)"/>

  <!-- Sparkle dots background -->
  <circle cx="40" cy="80" r="8" fill="#FFE66D" opacity="0.5"/>
  <circle cx="200" cy="60" r="6" fill="#FFE66D" opacity="0.4"/>
  <circle cx="180" cy="200" r="10" fill="#FFE66D" opacity="0.3"/>
  <circle cx="30" cy="300" r="7" fill="#FFE66D" opacity="0.4"/>
  <circle cx="210" cy="350" r="9" fill="#FFE66D" opacity="0.35"/>

  <!-- Status bar -->
  <rect x="3" y="3" width="234" height="24" rx="24" fill="black" opacity="0.25"/>
  <text x="20" y="19" font-family="Arial" font-size="10" fill="white">9:41</text>
  <text x="190" y="19" font-family="Arial" font-size="10" fill="white">●●● ■</text>

  <!-- Name badge -->
  <rect x="35" y="40" width="170" height="24" rx="12" fill="white" opacity="0.25"/>
  <rect x="35" y="40" width="170" height="24" rx="12" fill="none" stroke="#FFE66D" stroke-width="1.5"/>
  <text x="120" y="56" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">🎉 Aarav • Turning 5!</text>

  <!-- Title -->
  <text x="120" y="100" font-family="Arial" font-size="20" fill="white" text-anchor="middle" font-weight="900">Happy Birthday!</text>

  <!-- Emoji with glow -->
  <circle cx="120" cy="185" r="55" fill="#FFE66D" opacity="0.25"/>
  <text x="120" y="210" font-family="Segoe UI Emoji" font-size="70" text-anchor="middle">🎂</text>

  <!-- Message card -->
  <rect x="20" y="280" width="200" height="60" rx="14" fill="black" opacity="0.3"/>
  <rect x="20" y="280" width="200" height="60" rx="14" fill="none" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <text x="120" y="305" font-family="Arial" font-size="11" fill="white" text-anchor="middle">Today is YOUR special day! 🎉</text>
  <text x="120" y="322" font-family="Arial" font-size="11" fill="white" text-anchor="middle">The whole world celebrates YOU!</text>

  <!-- Dot indicators -->
  <circle cx="85" cy="360" r="6" fill="#FFE66D"/>
  <circle cx="100" cy="360" r="4" fill="white" opacity="0.4"/>
  <circle cx="113" cy="360" r="4" fill="white" opacity="0.4"/>
  <circle cx="126" cy="360" r="4" fill="white" opacity="0.4"/>
  <circle cx="139" cy="360" r="4" fill="white" opacity="0.4"/>
  <circle cx="152" cy="360" r="4" fill="white" opacity="0.4"/>

  <!-- Bottom controls -->
  <rect x="20" y="380" width="200" height="44" rx="22" fill="black" opacity="0.45"/>
  <text x="52" y="407" font-family="Arial" font-size="16" fill="white" text-anchor="middle">◀</text>
  <circle cx="100" cy="402" r="18" fill="white" opacity="0.2"/>
  <text x="100" y="409" font-family="Arial" font-size="16" fill="white" text-anchor="middle">▶</text>
  <text x="148" y="407" font-family="Arial" font-size="16" fill="white" text-anchor="middle">▶▶</text>
  <text x="194" y="407" font-family="Arial" font-size="14" fill="white" text-anchor="middle">✏️</text>

  <!-- Confetti -->
  <rect x="45" y="250" width="8" height="5" rx="1" fill="#4ECDC4" opacity="0.8" transform="rotate(20 49 252)"/>
  <rect x="170" y="270" width="7" height="4" rx="1" fill="#FF6B9D" opacity="0.8" transform="rotate(-15 173 272)"/>
  <circle cx="55" cy="230" r="4" fill="#FFD32A" opacity="0.7"/>
  <circle cx="190" cy="240" r="3" fill="#A29BFE" opacity="0.7"/>

  <!-- Home indicator -->
  <rect x="90" y="458" width="60" height="4" rx="2" fill="white" opacity="0.4"/>
</svg>
