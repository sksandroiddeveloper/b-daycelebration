<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0A2E"/>
      <stop offset="50%" style="stop-color:#2D1554"/>
      <stop offset="100%" style="stop-color:#1A0A2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#E84393"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="16"/>

  <!-- Decorative circles -->
  <circle cx="80" cy="40" r="60" fill="#6C5CE7" opacity="0.12"/>
  <circle cx="820" cy="160" r="70" fill="#E84393" opacity="0.10"/>
  <circle cx="450" cy="100" r="120" fill="#845EC2" opacity="0.07"/>

  <!-- Confetti dots -->
  <circle cx="150" cy="30" r="5" fill="#FFE66D" opacity="0.8"/>
  <circle cx="200" cy="60" r="4" fill="#FF6B6B" opacity="0.7"/>
  <circle cx="700" cy="40" r="5" fill="#4ECDC4" opacity="0.8"/>
  <circle cx="750" cy="70" r="4" fill="#FFD32A" opacity="0.7"/>
  <circle cx="100" cy="150" r="4" fill="#A29BFE" opacity="0.7"/>
  <circle cx="800" cy="130" r="5" fill="#FF9A3C" opacity="0.8"/>
  <circle cx="350" cy="20" r="3" fill="#FF6B9D" opacity="0.8"/>
  <circle cx="560" cy="180" r="4" fill="#FFE66D" opacity="0.7"/>

  <!-- Emoji decorations -->
  <text x="60" y="120" font-size="36" font-family="Segoe UI Emoji">🎂</text>
  <text x="790" y="120" font-size="32" font-family="Segoe UI Emoji">🎊</text>
  <text x="130" y="75" font-size="20" font-family="Segoe UI Emoji">🎈</text>
  <text x="730" y="65" font-size="20" font-family="Segoe UI Emoji">⭐</text>
  <text x="820" y="55" font-size="18" font-family="Segoe UI Emoji">🎵</text>

  <!-- Main title -->
  <text x="450" y="90" font-family="Arial, sans-serif" font-weight="900"
        font-size="42" fill="white" text-anchor="middle" filter="url(#glow)">
    🎂 Birthday Celebrate
  </text>

  <!-- Gradient underline -->
  <rect x="220" y="100" width="460" height="3" fill="url(#accent)" rx="2"/>

  <!-- Subtitle -->
  <text x="450" y="135" font-family="Arial, sans-serif" font-size="16"
        fill="white" text-anchor="middle" opacity="0.7">
    10 Animated Slides · Background Music · Phone Gallery Photos · 100% Offline
  </text>

  <!-- Tech badges -->
  <rect x="225" y="155" width="90" height="22" rx="11" fill="#6C5CE7" opacity="0.8"/>
  <text x="270" y="170" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Kotlin</text>

  <rect x="325" y="155" width="110" height="22" rx="11" fill="#0084FF" opacity="0.8"/>
  <text x="380" y="170" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Jetpack Compose</text>

  <rect x="445" y="155" width="65" height="22" rx="11" fill="#00B894" opacity="0.8"/>
  <text x="477" y="170" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">MVVM</text>

  <rect x="520" y="155" width="80" height="22" rx="11" fill="#E84393" opacity="0.8"/>
  <text x="560" y="170" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">DataStore</text>

  <rect x="610" y="155" width="70" height="22" rx="11" fill="#FF6B35" opacity="0.8"/>
  <text x="645" y="170" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Offline ✓</text>
</svg>
