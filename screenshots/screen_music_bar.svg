<svg width="240" height="480" viewBox="0 0 240 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="slide1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#845EC2"/>
      <stop offset="100%" style="stop-color:#2D1554"/>
    </linearGradient>
    <linearGradient id="musicbar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A0A2E" stop-opacity="0.97"/>
      <stop offset="100%" style="stop-color:#2D1554" stop-opacity="0.97"/>
    </linearGradient>
    <linearGradient id="playbtn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#E84393"/>
    </linearGradient>
    <clipPath id="phone2"><rect width="240" height="480" rx="28"/></clipPath>
  </defs>

  <!-- Phone frame -->
  <rect width="240" height="480" rx="28" fill="#111" stroke="#444" stroke-width="2"/>
  <rect x="3" y="3" width="234" height="474" rx="26" fill="url(#slide1)" clip-path="url(#phone2)"/>

  <!-- Background sparkles -->
  <circle cx="60" cy="200" r="40" fill="#FF9671" opacity="0.2"/>
  <circle cx="190" cy="150" r="50" fill="#6C5CE7" opacity="0.15"/>

  <!-- Status bar -->
  <rect x="3" y="3" width="234" height="24" rx="24" fill="black" opacity="0.3"/>
  <text x="20" y="19" font-family="Arial" font-size="10" fill="white">9:41</text>
  <text x="190" y="19" font-family="Arial" font-size="10" fill="white">●●● ■</text>

  <!-- ═══ MUSIC BAR ═══ -->
  <rect x="3" y="27" width="234" height="72" fill="url(#musicbar)"/>
  <rect x="3" y="27" width="234" height="72" fill="none" stroke="url(#playbtn)" stroke-width="1" opacity="0.6"/>

  <!-- Vinyl record (animated in app) -->
  <circle cx="38" cy="63" r="20" fill="none" stroke="#6C5CE7" stroke-width="1.5"/>
  <circle cx="38" cy="63" r="15" fill="#2D1554"/>
  <circle cx="38" cy="63" r="10" fill="#6C5CE7" opacity="0.4"/>
  <circle cx="38" cy="63" r="5" fill="#1A0A2E"/>
  <!-- Vinyl grooves -->
  <circle cx="38" cy="63" r="18" fill="none" stroke="#A29BFE" stroke-width="0.5" opacity="0.5"/>
  <circle cx="38" cy="63" r="12" fill="none" stroke="#A29BFE" stroke-width="0.5" opacity="0.5"/>

  <!-- Song info -->
  <text x="66" y="55" font-family="Arial" font-size="9" fill="#AD7BFF" font-weight="bold">🎵 NOW PLAYING</text>
  <text x="66" y="70" font-family="Arial" font-size="12" fill="white" font-weight="bold">Happy Birthday Song</text>

  <!-- Volume icon -->
  <text x="158" y="67" font-family="Arial" font-size="14" fill="#AD7BFF">🔊</text>

  <!-- Play/Pause button -->
  <circle cx="192" cy="63" r="16" fill="url(#playbtn)"/>
  <text x="192" y="69" font-family="Arial" font-size="14" fill="white" text-anchor="middle">⏸</text>

  <!-- Close/Stop button -->
  <text x="218" y="69" font-family="Arial" font-size="16" fill="white" opacity="0.6" text-anchor="middle">✕</text>

  <!-- Bottom border of music bar -->
  <line x1="3" y1="99" x2="237" y2="99" stroke="url(#playbtn)" stroke-width="1" opacity="0.5"/>

  <!-- ═══ NOTIFICATION PREVIEW ═══ -->
  <rect x="15" y="115" width="210" height="70" rx="12" fill="#1A1A2E" opacity="0.95"/>
  <rect x="15" y="115" width="210" height="70" rx="12" fill="none" stroke="#6C5CE7" stroke-width="1"/>

  <!-- Notification icon + title -->
  <text x="28" y="133" font-family="Segoe UI Emoji" font-size="14">🎂</text>
  <text x="48" y="133" font-family="Arial" font-size="11" fill="white" font-weight="bold">Birthday Celebrate</text>
  <text x="195" y="133" font-family="Arial" font-size="9" fill="white" opacity="0.5">now</text>

  <text x="28" y="150" font-family="Arial" font-size="11" fill="white" opacity="0.9">🎵 Happy Birthday Song</text>

  <!-- Notification action buttons -->
  <rect x="28" y="160" width="55" height="18" rx="9" fill="#6C5CE7" opacity="0.8"/>
  <text x="55" y="172" font-family="Arial" font-size="10" fill="white" text-anchor="middle">⏸ Pause</text>

  <rect x="90" y="160" width="50" height="18" rx="9" fill="#444" opacity="0.9"/>
  <text x="115" y="172" font-family="Arial" font-size="10" fill="white" text-anchor="middle">✕ Close</text>

  <!-- Label arrow -->
  <text x="155" y="152" font-family="Arial" font-size="8" fill="#FF6B6B">← tap to stop music</text>

  <!-- Main slide content below -->
  <text x="120" y="240" font-family="Arial" font-size="18" fill="white" text-anchor="middle" font-weight="900">You Are Amazing!</text>

  <circle cx="120" cy="310" r="45" fill="#FF9671" opacity="0.2"/>
  <text x="120" y="335" font-family="Segoe UI Emoji" font-size="60" text-anchor="middle">🌟</text>

  <rect x="25" y="375" width="190" height="52" rx="14" fill="black" opacity="0.3"/>
  <text x="120" y="398" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Every single day you make</text>
  <text x="120" y="413" font-family="Arial" font-size="10" fill="white" text-anchor="middle">our hearts overflow with joy! 💖</text>

  <!-- Home indicator -->
  <rect x="90" y="458" width="60" height="4" rx="2" fill="white" opacity="0.4"/>
</svg>
