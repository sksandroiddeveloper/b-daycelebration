# ══════════════════════════════════════════════════════════════════
#  Dependency Review & Security Scan
#  Runs every Monday at 9:00 AM UTC.
#  Checks for outdated Gradle dependencies and known vulnerabilities.
# ══════════════════════════════════════════════════════════════════

name: 🔒 Dependency Review

on:
  schedule:
    - cron: '0 9 * * 1'    # Every Monday at 9 AM UTC
  workflow_dispatch:         # Also run manually

jobs:

  dependency-check:
    name: 🔍 Check Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 🔐 Make gradlew executable
        run: chmod +x ./gradlew

      - name: 📋 List outdated dependencies
        run: ./gradlew dependencyUpdates --no-daemon || true
        continue-on-error: true

      - name: 🔍 Dependency vulnerability scan
        uses: dependency-review-action@v4
        if: github.event_name == 'pull_request'
        continue-on-error: true

      - name: 📊 Upload dependency report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-update-report
          path: build/dependencyUpdates/report.txt
          retention-days: 30
