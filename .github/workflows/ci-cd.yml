# ══════════════════════════════════════════════════════════════════
#  🎂 Birthday Celebrate App — CI/CD
#
#  Triggers : push to main/develop, any PR, manual run
#  Jobs     : Lint → Unit Tests → Build Debug APK
#  Signing  : NONE — debug APK uses Android's built-in debug key
#  Secrets  : NONE required
#
#  Get your APK:
#    Actions tab → latest run → Artifacts → birthday-app-debug
# ══════════════════════════════════════════════════════════════════

name: 🎂 Birthday App CI/CD

on:
  push:
    branches: [ main, develop, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

# ──────────────────────────────────────────────────────────────────
#  JOB 1 — LINT
# ──────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ☕ JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 🔐 Make gradlew executable
        run: chmod +x ./gradlew

      - name: 🔍 Run lint
        run: ./gradlew lintDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g"

      - name: 📋 Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7


# ──────────────────────────────────────────────────────────────────
#  JOB 2 — UNIT TESTS
# ──────────────────────────────────────────────────────────────────
  unit-test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ☕ JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 🔐 Make gradlew executable
        run: chmod +x ./gradlew

      - name: 🧪 Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g"

      - name: 📊 Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7


# ──────────────────────────────────────────────────────────────────
#  JOB 3 — BUILD DEBUG APK (no signing, no keystore, no secrets)
# ──────────────────────────────────────────────────────────────────
  build-apk:
    name: 🔨 Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-test

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ☕ JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 🔐 Make gradlew executable
        run: chmod +x ./gradlew

      # assembleDebug auto-signs with Android's built-in debug keystore
      # located at ~/.android/debug.keystore — no secrets needed at all
      - name: 🔨 Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g"

      # Rename APK to include branch name + short SHA for traceability
      - name: 🏷️ Rename APK
        run: |
          BRANCH="${GITHUB_REF_NAME//\//-}"
          SHORT_SHA="${GITHUB_SHA::7}"
          mkdir -p apk-output
          cp app/build/outputs/apk/debug/app-debug.apk \
             "apk-output/BirthdayCelebrate-${BRANCH}-${SHORT_SHA}.apk"
          echo "APK_FILE=BirthdayCelebrate-${BRANCH}-${SHORT_SHA}.apk" >> $GITHUB_ENV

      # Upload APK — downloadable from Actions → Artifacts for 30 days
      - name: 📱 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: birthday-app-debug
          path: apk-output/
          retention-days: 30

      # Write a nice summary in the Actions run page
      - name: 📋 Job summary
        run: |
          SIZE=$(du -sh "apk-output/${{ env.APK_FILE }}" | cut -f1)
          echo "## ✅ Debug APK Built Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **File** | \`${{ env.APK_FILE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | ${SIZE} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${GITHUB_REF_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${GITHUB_SHA::7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Signed** | Debug keystore (auto — no secrets needed) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📲 Install on your phone" >> $GITHUB_STEP_SUMMARY
          echo "1. Download **birthday-app-debug** artifact below" >> $GITHUB_STEP_SUMMARY
          echo "2. Unzip → transfer \`.apk\` to Android phone" >> $GITHUB_STEP_SUMMARY
          echo "3. Settings → Install unknown apps → Allow" >> $GITHUB_STEP_SUMMARY
          echo "4. Tap the APK to install 🎂" >> $GITHUB_STEP_SUMMARY
