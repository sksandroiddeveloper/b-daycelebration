# ══════════════════════════════════════════════════════════════════

# 🎂 Birthday Celebrate App — CI/CD (FIXED AndroidX)

# ══════════════════════════════════════════════════════════════════

name: 🎂 Birthday App CI/CD

on:
push:
branches: [ main, develop, 'feature/**', 'fix/**' ]
pull_request:
branches: [ main, develop ]
workflow_dispatch:

concurrency:
group: ${{ github.workflow }}-${{ github.ref }}
cancel-in-progress: true

jobs:

# ──────────────────────────────────────────────────────────────────

# JOB 1 — LINT

# ──────────────────────────────────────────────────────────────────

lint:
name: 🔍 Lint
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: temurin

  - uses: actions/cache@v4
    with:
      path: |
        ~/.gradle/caches
        ~/.gradle/wrapper
      key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}

  - run: chmod +x ./gradlew

  - name: 🧹 Clean
    run: ./gradlew clean

  - name: 🔍 Run lint (AndroidX FIX)
    run: ./gradlew lintDebug \
         -Pandroid.useAndroidX=true \
         -Pandroid.enableJetifier=true \
         --no-daemon --stacktrace
```

# ──────────────────────────────────────────────────────────────────

# JOB 2 — UNIT TESTS

# ──────────────────────────────────────────────────────────────────

unit-test:
name: 🧪 Unit Tests
runs-on: ubuntu-latest
needs: lint

```
steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: temurin

  - uses: actions/cache@v4
    with:
      path: |
        ~/.gradle/caches
        ~/.gradle/wrapper
      key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}

  - run: chmod +x ./gradlew

  - name: 🧹 Clean
    run: ./gradlew clean

  - name: 🧪 Run tests (AndroidX FIX)
    run: ./gradlew testDebugUnitTest \
         -Pandroid.useAndroidX=true \
         -Pandroid.enableJetifier=true \
         --no-daemon --stacktrace
```

# ──────────────────────────────────────────────────────────────────

# JOB 3 — BUILD DEBUG APK

# ──────────────────────────────────────────────────────────────────

build-apk:
name: 🔨 Build Debug APK
runs-on: ubuntu-latest
needs: unit-test

```
steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: temurin

  - uses: actions/cache@v4
    with:
      path: |
        ~/.gradle/caches
        ~/.gradle/wrapper
      key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}

  - run: chmod +x ./gradlew

  - name: 🧹 Clean
    run: ./gradlew clean

  - name: 🔨 Build APK (AndroidX FIX)
    run: ./gradlew assembleDebug \
         -Pandroid.useAndroidX=true \
         -Pandroid.enableJetifier=true \
         --no-daemon --stacktrace

  - name: 🏷️ Rename APK
    run: |
      BRANCH="${GITHUB_REF_NAME//\//-}"
      SHORT_SHA="${GITHUB_SHA::7}"
      mkdir -p apk-output
      cp app/build/outputs/apk/debug/app-debug.apk \
         "apk-output/BirthdayCelebrate-${BRANCH}-${SHORT_SHA}.apk"
      echo "APK_FILE=BirthdayCelebrate-${BRANCH}-${SHORT_SHA}.apk" >> $GITHUB_ENV

  - name: 📱 Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: birthday-app-debug
      path: apk-output/
```
