name: 🎂 Birthday App CI/CD

on:
  push:
    branches: [ main, develop, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:

  # 🔍 Lint (NON-BLOCKING)
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true   # ✅ IMPORTANT

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - run: chmod +x ./gradlew

      - name: Run lint (ignore failure)
        run: ./gradlew lintDebug || true

  # 🧪 Unit Tests (NO dependency on lint)
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

  # 🔨 Build APK
  build-apk:
    runs-on: ubuntu-latest
    needs: unit-test   # ✅ only depends on tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: birthday-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk