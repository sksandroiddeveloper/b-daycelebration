# ══════════════════════════════════════════════════════════════════
#  Birthday Celebrate App — CI/CD Pipeline
#  NO signing key required. No release job. No Play Store upload.
#
#  WHAT THIS DOES:
#    Every push / PR → Lint → Unit Tests → Build Debug APK
#    The APK is saved as a downloadable artifact in GitHub Actions.
#    That's it. Simple and clean.
#
#  HOW TO GET YOUR APK AFTER EACH BUILD:
#    1. Go to your GitHub repo
#    2. Click "Actions" tab
#    3. Click the latest workflow run
#    4. Scroll down to "Artifacts"
#    5. Download "birthday-app-debug" zip → contains the .apk
# ══════════════════════════════════════════════════════════════════

name: 🎂 Birthday App CI/CD

on:
  push:
    branches: [ main, develop, 'feature/**', 'fix/**' ]

  pull_request:
    branches: [ main, develop ]

  workflow_dispatch:      # Manual trigger — run from GitHub Actions tab anytime

# Cancel older run on same branch when new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS:  '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true'

jobs:

# ══════════════════════════════════════════════════════════════════
#  JOB 1 — LINT
#  Checks code quality. Runs first so we catch issues early.
# ══════════════════════════════════════════════════════════════════
  lint:
    name: 🔍 Lint Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 🔐 Make gradlew executable
        run: chmod +x ./gradlew

      - name: 🔍 Run Android Lint
        run: ./gradlew lintDebug --no-daemon

      - name: 📋 Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7


# ══════════════════════════════════════════════════════════════════
#  JOB 2 — UNIT TESTS
#  Runs all JVM unit tests. No emulator needed — fast.
# ══════════════════════════════════════════════════════════════════
  unit-test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 🔐 Make gradlew executable
        run: chmod +x ./gradlew

      - name: 🧪 Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7


# ══════════════════════════════════════════════════════════════════
#  JOB 3 — BUILD DEBUG APK
#  Builds an unsigned debug APK every time code changes.
#  No keystore. No secrets. No signing needed.
#  Download the APK from the Actions → Artifacts section.
# ══════════════════════════════════════════════════════════════════
  build-apk:
    name: 🔨 Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: unit-test

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 🔐 Make gradlew executable
        run: chmod +x ./gradlew

      # ── Build unsigned debug APK ──────────────────────────────
      # assembleDebug uses Android's built-in debug keystore automatically.
      # No secrets or signing config needed at all.
      - name: 🔨 Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon

      # ── Rename APK to include branch and short commit SHA ─────
      - name: 🏷️ Rename APK with branch & commit info
        run: |
          BRANCH="${GITHUB_REF_NAME//\//-}"          # replace / with - in branch names
          SHORT_SHA="${GITHUB_SHA::7}"
          APK_NAME="BirthdayCelebrate-${BRANCH}-${SHORT_SHA}-debug.apk"
          mkdir -p apk-output
          cp app/build/outputs/apk/debug/app-debug.apk apk-output/${APK_NAME}
          echo "APK_NAME=${APK_NAME}" >> $GITHUB_ENV
          echo "✅ APK ready: ${APK_NAME}"

      # ── Upload APK as downloadable artifact ──────────────────
      - name: 📱 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: birthday-app-debug
          path: apk-output/
          retention-days: 30          # Available for 30 days in Actions tab

      # ── Print APK info in the workflow summary ────────────────
      - name: 📋 Write job summary
        run: |
          APK_SIZE=$(du -sh apk-output/${{ env.APK_NAME }} | cut -f1)
          echo "## 🎂 Birthday App — Debug APK Built Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **APK File** | \`${{ env.APK_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **APK Size** | ${APK_SIZE} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${GITHUB_REF_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${GITHUB_SHA::7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Signed** | ❌ No (debug build — no keystore needed) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📲 How to install" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the \`birthday-app-debug\` artifact below" >> $GITHUB_STEP_SUMMARY
          echo "2. Unzip it to get the \`.apk\` file" >> $GITHUB_STEP_SUMMARY
          echo "3. Transfer to your Android phone" >> $GITHUB_STEP_SUMMARY
          echo "4. Enable **Install unknown apps** in Android Settings" >> $GITHUB_STEP_SUMMARY
          echo "5. Tap the APK to install 🎉" >> $GITHUB_STEP_SUMMARY
