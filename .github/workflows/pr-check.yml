# ══════════════════════════════════════════════════════════════════
#  PR Quality Gate
#  Runs on every Pull Request — fast checks only (< 5 minutes).
#  Blocks merge if any step fails.
# ══════════════════════════════════════════════════════════════════

name: 🔎 PR Quality Gate

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened ]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:

  quality-gate:
    name: ✅ Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 🔐 Make gradlew executable
        run: chmod +x ./gradlew

      # Run lint + compile + unit tests in a single Gradle invocation
      # This is faster than separate jobs for PRs
      - name: 🔍 Lint check
        run: ./gradlew lintDebug --no-daemon

      - name: 🧪 Unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: 🔨 Compile check (no APK needed)
        run: ./gradlew compileDebugKotlin --no-daemon

      # Post a summary comment on the PR
      - name: 📋 Post summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { context } = require('@actions/github');
            const status = '${{ job.status }}';
            const emoji  = status === 'success' ? '✅' : '❌';
            const msg    = status === 'success'
              ? '**All quality checks passed!** This PR is ready for review. 🎂'
              : '**Quality checks failed.** Please fix the issues above before merging.';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body:         `## ${emoji} CI Quality Gate\n\n${msg}\n\n**Commit:** \`${context.sha.substring(0,7)}\`\n**Workflow:** [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });

      - name: 📊 Upload lint report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr-lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 3
