name: 🔎 PR Quality Gate

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened ]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: ✅ Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ☕ JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: 🔐 Make gradlew executable
        run: chmod +x ./gradlew

      # 🔍 Lint (NON-BLOCKING)
      - name: 🔍 Lint check (non-blocking)
        run: ./gradlew lintDebug || true

      # 🧪 Tests (MUST PASS)
      - name: 🧪 Unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      # 🔨 Compile check (MUST PASS)
      - name: 🔨 Compile check
        run: ./gradlew compileDebugKotlin --no-daemon --stacktrace

      # 📋 PR Comment
      - name: 📋 Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji  = status === 'success' ? '✅' : '❌';
            const msg    = status === 'success'
              ? '**Tests & Build Passed!** Ready to merge. 🎂'
              : '**Build/Test failed.** Please fix errors.';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo:  context.repo.repo,
              body: `## ${emoji} PR Quality Gate\n\n${msg}\n\n**Commit:** \`${context.sha.substring(0,7)}\`\n**Run:** [View details](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });