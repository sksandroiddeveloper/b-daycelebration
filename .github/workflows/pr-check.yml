# ══════════════════════════════════════════════════════════════════

# PR Quality Gate — runs on every Pull Request

# Posts a pass/fail comment on the PR automatically

# ══════════════════════════════════════════════════════════════════

name: 🔎 PR Quality Gate

on:
pull_request:
branches: [ main, develop ]
types: [ opened, synchronize, reopened ]

concurrency:
group: pr-${{ github.event.pull_request.number }}
cancel-in-progress: true

jobs:
quality-gate:
name: ✅ Quality Gate
runs-on: ubuntu-latest
timeout-minutes: 20

```
steps:
  - name: ⬇️ Checkout
    uses: actions/checkout@v4

  - name: ☕ JDK 17
    uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: temurin

  - name: 📦 Cache Gradle
    uses: actions/cache@v4
    with:
      path: |
        ~/.gradle/caches
        ~/.gradle/wrapper
        ~/.android/build-cache
      key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
      restore-keys: gradle-${{ runner.os }}-

  - name: 🔐 Make gradlew executable
    run: chmod +x ./gradlew

  # ✅ Clean (important for CI stability)
  - name: 🧹 Clean
    run: ./gradlew clean

  # ✅ AndroidX FIX applied here
  - name: 🔍 Lint check
    run: ./gradlew lintDebug \
         -Pandroid.useAndroidX=true \
         -Pandroid.enableJetifier=true \
         --no-daemon --stacktrace
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g"

  # ✅ AndroidX FIX applied here
  - name: 🧪 Unit tests
    run: ./gradlew testDebugUnitTest \
         -Pandroid.useAndroidX=true \
         -Pandroid.enableJetifier=true \
         --no-daemon --stacktrace
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g"

  # ✅ AndroidX FIX applied here
  - name: 🔨 Compile check
    run: ./gradlew compileDebugKotlin \
         -Pandroid.useAndroidX=true \
         -Pandroid.enableJetifier=true \
         --no-daemon --stacktrace
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g"

  - name: 📋 Post PR comment
    if: always()
    uses: actions/github-script@v7
    with:
      script: |
        const status = '${{ job.status }}';
        const emoji  = status === 'success' ? '✅' : '❌';
        const msg    = status === 'success'
          ? '**All checks passed!** Ready to merge. 🎂'
          : '**Checks failed.** Please fix the errors above.';
        github.rest.issues.createComment({
          issue_number: context.issue.number,
          owner: context.repo.owner,
          repo:  context.repo.repo,
          body: `## ${emoji} PR Quality Gate\n\n${msg}\n\n**Commit:** \`${context.sha.substring(0,7)}\`\n**Run:** [View details](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
        });

  - name: 📊 Upload lint report on failure
    if: failure()
    uses: actions/upload-artifact@v4
    with:
      name: pr-lint-report
      path: app/build/reports/lint-results-debug.html
      retention-days: 3
```
